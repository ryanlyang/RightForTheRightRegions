dataset:
  root_dir: '/home/ryreu/guided_cnn/code/SwitchCLIP/LearningToLook/code/WeCLIPPlus/VOCdevkit/VOC2012'
  name_list_dir: '/home/ryreu/guided_cnn/code/SwitchCLIP/LearningToLook/code/WeCLIPPlus/VOCdevkit/VOC2012/ImageSets/Main'
  num_classes: 2
  crop_size: 320 # 320 for clip-16
  resize_range: [512, 2048]
  rescale_range: [0.5, 2.0]
  ignore_index: 255

work_dir:
  dir: work_dir_voc
  ckpt_dir: checkpoints
  pred_dir: predictions
  segs_dir: segs
  tb_logger_dir: tb_logger

train:
  split: train
  samples_per_gpu: 4 #4 #2
  max_iters: 30000 #30000 originally
  cam_iters: 2000 #2000 Originally
  eval_iters: 2000
  log_iters: 200


val:
  split: val

optimizer:
  type: AdamW
  learning_rate: 2e-5 #2e-4
  betas: [0.9, 0.999]
  weight_decay: 0.01

scheduler:
  warmup_iter: 50 #1500
  warmup_ratio: 1e-6
  power: 1.0

clip_init:
  clip_pretrain_path: '/home/ryreu/guided_cnn/code/SwitchCLIP/LearningToLook/code/WeCLIPPlus/pretrained/ViT-B-16.pt'
  clip_pretrained: 'openai'
  embedding_dim: 256
  in_channels: [768, 768,768,768]
  clip_flag: 16 # if VIT-B-16, set as 16
  resize_long: 512

